<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Penyakit - Admin CBR Kakao</title>
    <link href="../assets/vendor/fonts/poppins/index.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../assets/vendor/fontawesome/css/all.min.css">
    <style>
        .solusi-preview { max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#555; }
    </style>
</head>

<body class="dashboard-body">
    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-leaf"></i><span>ADMIN PANEL</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="kelola_gejala.html"><i class="fas fa-viruses"></i> Kelola Gejala</a></li>
                <li><a href="kelola_penyakit.html" class="active"><i class="fas fa-bacteria"></i> Kelola Penyakit</a></li>
                <li><a href="kelola_hama.html"><i class="fas fa-bug"></i> Kelola Hama</a></li>

                <li><a href="kelola_kasus.html"><i class="fas fa-database"></i> Kelola Data Kasus</a></li>
                <li><a href="kelola_artikel.html"><i class="fas fa-newspaper"></i> Kelola Artikel</a></li>
                <li><a href="pengguna.html"><i class="fas fa-users"></i> Data Pengguna</a></li>
                <li><a href="laporan.html"><i class="fas fa-file-alt"></i> Laporan Diagnosis</a></li>
                <li class="menu-logout"><a href="#" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Kelola Penyakit</h2>
                <div class="user-info"><span id="admin-name">Admin</span> <i class="fas fa-user-circle"></i></div>
            </header>
            <div class="content-padding">
                <div class="row-between mb-3">
                    <h3 class="page-title">Data Penyakit Master</h3>
                    <button class="btn-primary btn-sm" onclick="openModalPenyakit()">
                        <i class="fas fa-plus"></i> Tambah Penyakit
                    </button>
                </div>
                <div class="card-table">
                    <table class="public-table">
                        <thead>
                            <tr>
                                <th width="50">No</th>
                                <th width="110">Kode</th>
                                <th>Nama Penyakit</th>
                                <th>Solusi / Penanganan</th>
                                <th width="130">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-penyakit-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Penyakit -->
    <div id="modal-penyakit" class="modal hidden">
        <div class="modal-content admin-modal">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modal-title-penyakit">Tambah Penyakit</h3>
            <form onsubmit="savePenyakit(event)">
                <input type="hidden" id="penyakit-mode">
                <div class="form-group">
                    <label>Kode Penyakit (Otomatis)</label>
                    <input type="text" id="input-kode-penyakit" style="background:#e9ecef; cursor:not-allowed;" readonly>
                </div>
                <div class="form-group">
                    <label>Nama Penyakit / Hama</label>
                    <input type="text" id="input-nama-penyakit" placeholder="Masukkan nama penyakit..." required>
                </div>
                <div class="form-group">
                    <label>Solusi / Cara Penanganan</label>
                    <textarea id="input-solusi-penyakit" rows="4" placeholder="Masukkan solusi penanganan..." required></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width:100%"><i class="fas fa-save"></i> Simpan Data</button>
            </form>
        </div>
    </div>

    <script>
        (function() {
            if (!localStorage.getItem('adminToken')) { window.location.href = '../auth.html'; return; }
            document.getElementById('admin-name').innerText = localStorage.getItem('adminNama') || 'Admin';
        })();

        function doLogout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminNama');
            window.location.href = '../auth.html';
        }

        let dataPenyakit = [];

        async function loadPenyakit() {
            const resp = await fetch('../api/api_penyakit.php?action=read&jenis=Penyakit');
            dataPenyakit = await resp.json();
            const tbody = document.getElementById('table-penyakit-body');
            tbody.innerHTML = '';
            if (dataPenyakit.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:20px;">Belum ada data penyakit</td></tr>';
                return;
            }
            dataPenyakit.forEach((item, i) => {
                const solusiPreview = item.solusi.length > 80 ? item.solusi.substring(0, 80) + '...' : item.solusi;
                tbody.innerHTML += `
                    <tr>
                        <td>${i + 1}</td>
                        <td><b>${item.kode}</b></td>
                        <td>${item.nama}</td>
                        <td class="solusi-preview" title="${item.solusi}">${solusiPreview}</td>
                        <td>
                            <button class="btn-primary btn-sm" onclick="editPenyakit(${i})" style="padding:5px 10px; background:#007bff;"><i class="fas fa-edit"></i></button>
                            <button class="btn-primary btn-sm" onclick="hapusPenyakit('${item.kode}')" style="padding:5px 10px; background:#dc3545;"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function generateKode() {
            if (dataPenyakit.length === 0) return 'P01';
            const last = dataPenyakit[dataPenyakit.length - 1].kode;
            const num = parseInt(last.replace(/\D/g, '')) + 1;
            return 'P' + String(num).padStart(2, '0');
        }

        function openModalPenyakit() {
            document.getElementById('penyakit-mode').value = 'tambah';
            document.getElementById('input-kode-penyakit').value = generateKode();
            document.getElementById('input-nama-penyakit').value = '';
            document.getElementById('input-solusi-penyakit').value = '';
            document.getElementById('modal-title-penyakit').innerText = 'Tambah Penyakit Baru';
            document.getElementById('modal-penyakit').classList.remove('hidden');
        }

        function editPenyakit(index) {
            const d = dataPenyakit[index];
            document.getElementById('penyakit-mode').value = 'edit';
            document.getElementById('input-kode-penyakit').value = d.kode;
            document.getElementById('input-nama-penyakit').value = d.nama;
            document.getElementById('input-solusi-penyakit').value = d.solusi;
            document.getElementById('modal-title-penyakit').innerText = 'Edit Penyakit';
            document.getElementById('modal-penyakit').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-penyakit').classList.add('hidden');
        }

        async function savePenyakit(e) {
            e.preventDefault();
            const fd = new FormData();
            fd.append('kode',   document.getElementById('input-kode-penyakit').value);
            fd.append('nama',   document.getElementById('input-nama-penyakit').value);
            fd.append('solusi', document.getElementById('input-solusi-penyakit').value);
            fd.append('jenis',  'Penyakit');
            fd.append('mode',   document.getElementById('penyakit-mode').value);
            const resp = await fetch('../api/api_penyakit.php?action=save', { method: 'POST', body: fd });
            const res  = await resp.json();
            if (res.status === 'success') { closeModal(); loadPenyakit(); showToast(res.message, 'success'); }
            else showToast(res.message, 'error');
        }

        async function hapusPenyakit(kode) {
            if (!confirm('Hapus penyakit ' + kode + '? Data kasus terkait mungkin bermasalah!')) return;
            const fd = new FormData();
            fd.append('kode', kode);
            await fetch('../api/api_penyakit.php?action=delete', { method: 'POST', body: fd });
            loadPenyakit();
            showToast('Penyakit berhasil dihapus', 'success');
        }

        function showToast(msg, type = 'success') {
            let t = document.getElementById('toast-notif');
            if (!t) {
                t = document.createElement('div');
                t.id = 'toast-notif';
                t.style.cssText = 'position:fixed;bottom:24px;right:24px;padding:12px 22px;border-radius:8px;color:#fff;font-family:Poppins,sans-serif;font-size:0.875rem;z-index:9999;opacity:0;transform:translateY(16px);transition:all 0.3s;pointer-events:none;';
                document.body.appendChild(t);
            }
            t.innerText = msg;
            t.style.background = type === 'success' ? '#2E7D32' : '#c62828';
            t.style.opacity = '1'; t.style.transform = 'translateY(0)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(16px)'; }, 3000);
        }

        loadPenyakit();
    </script>
</body>
</html>
